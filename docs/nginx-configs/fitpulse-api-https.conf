# FitPulse - Combined Web Frontend & API Configuration
# This config serves the static Expo Web build and proxies API requests to the Rust backend.

# 1. HTTP to HTTPS Redirect
server {
    listen 80;
    listen [::]:80;
    server_name fit.rujbin.eu;
    
    return 301 https://$host$request_uri;
}

# 2. HTTPS / HTTP/2 Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    
    server_name fit.rujbin.eu;

    # SSL Certificates
    ssl_certificate /etc/letsencrypt/live/rujbin.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rujbin.eu/privkey.pem;

    # SSL Optimization & Security
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Security Headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";

    # --- PART 1: API PROXY ---
    # Proxies all requests starting with /api to the Rust backend
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Support for WebSockets
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_buffering off;
        proxy_read_timeout 90;
    }

    # --- PART 2: STATIC WEB FRONTEND ---
    # Serves the exported Expo Web files
    location / {
        # Path to your 'npx expo export' output folder on the VPS
        root /var/www/fitpulse/dist;
        index index.html;
        
        # Support for SPA routing (React Router / Expo Router)
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }
    }

    # Optional: Log files
    access_log /var/log/nginx/fitpulse_access.log;
    error_log /var/log/nginx/fitpulse_error.log;
}
