# FitPulse API - HTTPS with HTTP/2 configuration
# Recommended for production use.

# 1. HTTP to HTTPS Redirect
server {
    listen 80;
    listen [::]:80;
    server_name api.example.com;
    
    # Redirect all HTTP requests to HTTPS
    return 301 https://$host$request_uri;
}

# 2. HTTPS / HTTP/2 Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    
    # Replace with your actual domain
    server_name api.example.com;

    # SSL Certificates (Standard Certbot paths)
    # Replace 'api.example.com' with your actual domain folder name
    ssl_certificate /etc/letsencrypt/live/api.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.example.com/privkey.pem;

    # SSL Optimization
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;  # about 40000 sessions
    ssl_session_tickets off;

    # SSL Security (Modern profile)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS (Enable after testing)
    # add_header Strict-Transport-Security "max-age=63072000" always;

    # Security Headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";

    # Backend Proxy
    location / {
        proxy_pass http://127.0.0.1:4000;
        
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Support for WebSockets
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Buffering & Timeouts
        proxy_buffering off;
        proxy_read_timeout 90;
        proxy_connect_timeout 90;
        proxy_send_timeout 90;
    }

    # Optional: Log files
    access_log /var/log/nginx/fitpulse_access.log;
    error_log /var/log/nginx/fitpulse_error.log;
}
