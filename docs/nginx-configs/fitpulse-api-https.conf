# FitPulse - Combined Web Frontend & API Configuration (Docker Proxy)
# This host-config proxies everything to Docker containers.

# 1. HTTP to HTTPS Redirect
server {
    listen 80;
    listen [::]:80;
    server_name api.example.com;
    
    return 301 https://$host$request_uri;
}

# 2. HTTPS / HTTP/2 Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    
    server_name api.example.com;

    # SSL Certificates
    # REPLACE with your actual certificate paths
    ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

    # SSL Optimization & Security
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Security Headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";

    # --- PART 1: API PROXY ---
    # Proxies all requests starting with /api to the backend container
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Support for WebSockets
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_buffering off;
        proxy_read_timeout 90;
    }

    # --- PART 2: FRONTEND PROXY ---
    # Proxies everything else to the frontend container (Port 4001)
    location / {
        proxy_pass http://127.0.0.1:4001;
        
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optional: Log files
    access_log /var/log/nginx/fitpulse_access.log;
    error_log /var/log/nginx/fitpulse_error.log;
}
