# FitPulse API - HTTP only configuration
# Use this only for initial setup or internal networks.
# For production, please use the HTTPS configuration.

server {
    listen 80;
    listen [::]:80;
    
    # Replace with your actual domain or IP
    server_name api.example.com;

    # Backend Proxy
    location / {
        proxy_pass http://127.0.0.1:3000;
        
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Support for WebSockets (if needed in future)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Buffering & Timeouts
        proxy_buffering off;
        proxy_read_timeout 90;
        proxy_connect_timeout 90;
        proxy_send_timeout 90;
    }

    # Optional: Log files
    access_log /var/log/nginx/fitpulse_access.log;
    error_log /var/log/nginx/fitpulse_error.log;
}
